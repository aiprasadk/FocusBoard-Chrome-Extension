<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FocusBoard Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
  <link rel="stylesheet" href="analytics.css">
</head>
<body>
  <div class="overlay"></div>
  <div class="container analytics-container fade-in">
    <div class="analytics-header">
      <button id="back-to-board" class="btn secondary">← Back to Board</button>
      <h1 class="analytics-title">Your Productivity Insights</h1>
    </div>
    
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Tasks Completed (Last 7 Days)</h3>
        <canvas id="tasksChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Focus Time (Last 7 Days)</h3>
        <canvas id="focusChart"></canvas>
      </div>
      <div class="chart-card full-width">
        <h3>Recent Events Timeline</h3>
        <div id="events-timeline" class="events-timeline"></div>
      </div>
    </div>
  </div>
  
  <script src="chart.js"></script>
  <script src="analytics.js"></script>
</body>
</html>
